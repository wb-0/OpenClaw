<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦞 小龙虾 15.1 终极指挥中心</title>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; }
        h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .panel { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 20px; margin-bottom: 20px; }
        .btn { background-color: #238636; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; font-weight: bold; }
        .btn:hover { background-color: #2ea043; }
        .btn-lotto { background-color: #d29922; }
        .btn-lotto:hover { background-color: #e3b341; }
        #terminal { background-color: #010409; color: #00ff00; padding: 15px; border-radius: 6px; height: 300px; overflow-y: auto; white-space: pre-wrap; border: 1px solid #30363d; }
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: #8b949e; margin-bottom: 20px; }
        input[type="text"] { width: 80%; padding: 10px; background: #0d1117; border: 1px solid #30363d; color: white; border-radius: 4px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h1>🦞 小龙虾 15.1 - 绝对主权指挥中心</h1>
    
    <div class="status-bar">
        <span>🛡️ 主权认证: 24位离线助记词所有者</span>
        <span>🧠 引擎: Gemini 1.5 Flash直连</span>
        <span>💾 记忆库: Supabase (自动吞噬开启)</span>
        <span style="color: #f85149;">⏳ 700天死信协议: 沉睡中</span>
    </div>

    <div class="panel">
        <h3>🧹 清洁业务控制台</h3>
        <input type="text" id="cleanInput" placeholder="输入需求，例如：计算200平米办公室的清洁剂成本及排班...">
        <br>
        <button class="btn" onclick="executeTask('cleaning')">🚀 优化方案生成</button>
    </div>

    <div class="panel">
        <h3>🎰 Lotto Max 测算中枢</h3>
        <input type="text" id="lottoInput" placeholder="输入策略，例如：基于马尔可夫链分析过去10期奇偶分布...">
        <br>
        <button class="btn btn-lotto" onclick="executeTask('lotto')">🎯 执行数据推演</button>
    </div>

    <div class="panel">
        <h3>📡 赛博神经元回传输出 (Terminal)</h3>
        <div id="terminal">等待老板下达指令...</div>
    </div>

    <script>
        function typeWriter(text, i, cb) {
            if (i < text.length) {
                document.getElementById("terminal").innerHTML += text.charAt(i);
                setTimeout(function() { typeWriter(text, i + 1, cb) }, 10);
            } else if (cb) { cb(); }
        }

        async function executeTask(type) {
            const terminal = document.getElementById("terminal");
            terminal.innerHTML = ">>> 建立加密通讯链路...\n>>> 正在唤醒 Gemini 1.5...\n\n";
            
            let url = '';
            let payload = {};

            if (type === 'cleaning') {
                url = '/api/cleaning/optimize';
                payload = { task_desc: document.getElementById("cleanInput").value || "综合成本优化与排班" };
            } else {
                url = '/api/lotto/analyze';
                payload = { strategy: document.getElementById("lottoInput").value || "历史热点号码池分析" };
            }

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();
                
                if(data.status === 'success') {
                    terminal.innerHTML += "[记忆已自动写入 Supabase 向量库]\n\n";
                    typeWriter(data.data, 0);
                } else {
                    terminal.innerHTML += `<span style="color:red">ERROR: ${data.message}</span>`;
                }
            } catch (err) {
                terminal.innerHTML += `<span style="color:red">核心熔断，通讯失败: ${err.message}</span>`;
            }
        }
    </script>
</body>
</html>
